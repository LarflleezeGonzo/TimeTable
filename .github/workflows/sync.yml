name: Sync Timetable

on:
  schedule:
    - cron: '0 2 * * *'    # 7:30 AM IST
    - cron: '25 4 * * *'   # 9:55 AM IST
    - cron: '35 8 * * *'   # 2:05 PM IST
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

permissions:
  contents: write           # Required by peaceiris/actions-gh-pages to push gh-pages branch

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"   # 3.9 is EOL; 3.11 is the CI baseline

      - name: Install dependencies
        run: uv sync

      - name: Write Google credentials
        # Secrets are injected as files; never echoed to logs
        run: |
          echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.TOKEN_JSON }}'        > token.json

      - name: Sync timetable
        env:
          # SHEET_URL is referenced by timetable_sources.json (Term I url_env)
          SHEET_URL: ${{ secrets.SHEET_URL }}
        run: uv run python sync_timetable.py

      - name: Stage timetable.ics for deploy
        run: mkdir -p dist && cp timetable.ics dist/

      - name: Deploy timetable.ics to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          commit_message: "chore: update timetable.ics [skip ci]"
